<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Türk Sanat Musikisi</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="bg-photo"></div>
    <div class="bg-kagit"></div>
    <div class="bg-cizim"></div>

    <!-- Üst/alt orta süsler -->
    <div class="tezhip-frame">
      <svg
        viewBox="0 0 1200 800"
        xmlns="http://www.w3.org/2000/svg"
        preserveAspectRatio="none"
      >
        <!-- Üst orta süs -->
        <g
          opacity="0.15"
          fill="none"
          stroke="#9a7230"
          stroke-width="0.7"
          transform="translate(600,0)"
        >
          <path
            d="M -60 0 L -40 0 L -30 12 L 0 6 L 30 12 L 40 0 L 60 0"
            stroke-width="1"
          />
          <circle
            cx="0"
            cy="6"
            r="4"
            fill="#6b1a1a"
            opacity="0.5"
            stroke="none"
          />
          <circle
            cx="-30"
            cy="12"
            r="2.5"
            fill="#9a7230"
            opacity="0.4"
            stroke="none"
          />
          <circle
            cx="30"
            cy="12"
            r="2.5"
            fill="#9a7230"
            opacity="0.4"
            stroke="none"
          />
        </g>
        <!-- Alt orta süs -->
        <g
          opacity="0.15"
          fill="none"
          stroke="#9a7230"
          stroke-width="0.7"
          transform="translate(600,800) scale(1,-1)"
        >
          <path
            d="M -60 0 L -40 0 L -30 12 L 0 6 L 30 12 L 40 0 L 60 0"
            stroke-width="1"
          />
          <circle
            cx="0"
            cy="6"
            r="4"
            fill="#6b1a1a"
            opacity="0.5"
            stroke="none"
          />
          <circle
            cx="-30"
            cy="12"
            r="2.5"
            fill="#9a7230"
            opacity="0.4"
            stroke="none"
          />
          <circle
            cx="30"
            cy="12"
            r="2.5"
            fill="#9a7230"
            opacity="0.4"
            stroke="none"
          />
        </g>
      </svg>
    </div>

    <div class="app">
      <!-- BAŞLIK -->
      <header class="masthead">
        <div class="hat-cizgi">
          <div class="hat-cizgi-line"></div>
          <div style="position: relative">
            <div class="hat-cizgi-diamond"></div>
          </div>
          <div class="hat-cizgi-line"></div>
        </div>

        <div class="logo-arapca">موسيقى تركية كلاسيكية</div>
        <div class="logo-turkce">Türk Sanat Musikisi</div>
        <div class="logo-alt">Arşiv &amp; İcra</div>
      </header>

      <!-- SOL KOLON -->
      <main class="sol-kolon">
        <div class="parca-no" id="parca-no">I</div>

        <div class="simdi-etiketi durdu" id="simdi-etiketi">
          <span class="led"></span>
          <span id="durum-yazi">Beklemede</span>
        </div>

        <div class="parca-adi" id="parca-adi">—</div>
        <div class="sanatci-adi" id="sanatci-adi">—</div>

        <!-- Dalga görselleştirici -->
        <div class="makam-bar durdu" id="makam-bar">
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
          <div class="makam-nota"></div>
        </div>

        <!-- İlerleme -->
        <div class="ilerleme-bolum">
          <div
            class="ilerleme-hat"
            id="ilerleme-hat"
            onclick="seekClick(event)"
          >
            <div class="ilerleme-dolu" id="ilerleme-dolu"></div>
          </div>
          <div class="sure-satiri">
            <span id="sure-simdiki">0:00</span>
            <span id="sure-toplam">0:00</span>
          </div>
        </div>

        <!-- Ses ayarı -->
        <div class="ses-satiri">
          <div class="ses-ikon" id="ses-ikon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
              />
            </svg>
          </div>
          <input
            type="range"
            class="ses-slider"
            id="ses-slider"
            min="0"
            max="100"
            value="80"
          />
          <span class="ses-deger" id="ses-deger">80</span>
        </div>

        <!-- Kontroller -->
        <div class="kontroller">
          <button class="k-btn" onclick="prevTrack()" title="Önceki parça">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
            </svg>
          </button>

          <button class="k-btn k-oynat" id="k-oynat" onclick="togglePlay()">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="currentColor"
              id="oynat-ikon"
            >
              <polygon points="5,3 19,12 5,21" />
            </svg>
          </button>

          <button class="k-btn" onclick="nextTrack()" title="Sonraki parça">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"
              />
            </svg>
          </button>

          <button class="k-lirik" id="k-lirik" onclick="toggleLyrics()">
            Güfte
          </button>
        </div>

        <!-- Güfte paneli -->
        <div class="lirik-panel" id="lirik-panel">
          <div class="lirik-ic" id="lirik-metin"></div>
        </div>
      </main>

      <!-- SAĞ KOLON -->
      <aside class="sag-kolon">
        <div class="playlist-baslik">
          <div class="playlist-baslik-yazi">Fasıl</div>
          <div class="playlist-sayi" id="parca-sayi">— eser</div>
        </div>

        <div class="tezhip-hat"></div>

        <div class="playlist-liste" id="playlist-liste">
          <div class="durum-mesaj">
            <div class="spinner"></div>
            Yükleniyor…
          </div>
        </div>
      </aside>

      <!-- ALT ÇUBUK -->
      <footer class="alt-cubuk">
        <div class="alt-yazi">Türk Sanat Musikisi Arşivi</div>
        <a href="admin.html" class="admin-link">Yönetim →</a>
      </footer>
    </div>

    <!-- YouTube gizli player -->
    <div
      id="yt-player"
      style="
        position: fixed;
        bottom: -9999px;
        left: -9999px;
        width: 1px;
        height: 1px;
        pointer-events: none;
      "
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
